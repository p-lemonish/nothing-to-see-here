[c2_gateway]
# Tap-only gateway for the same PC as a running mesh_txrx.py process. The node
# shares opaque C2 uplinks over localhost, so this gateway does not need a radio
# iface or RF self-capture.
rx_enabled = false
iface = none
stream_id = 0xdeadbeef
gateway_id = 1
c2_http_forward_url = http://80.69.173.183:8080/ingest
rx_timeout_ms = 50
seen_limit = 4096
print_rssi = false
include_self = false

# Keep this false when sharing the iface with a mesh_txrx.py process; let the
# mesh process own channel hopping.
channel_agility = false
hop_channels = 36,40,48
channel_width = HT20
hop_slot_ms = 5000
hop_epoch_ms = 0
channel_settle_ms = 250
channel_down_up = true

local_tap_enabled = true
local_tap_bind_host = 127.0.0.1
local_tap_bind_port = 17801
local_tap_max_datagram_bytes = 65535
