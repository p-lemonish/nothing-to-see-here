[mesh]
# Optional local C2/gateway listener for RF testing before the cloud C2 exists.
# Replace iface with a monitor-mode adapter from `iw dev`.
iface = wlan0
stream_id = 0xdeadbeef
sender_id = 1
c2_id = 1
origin_type = c2
traffic_class = mesh
destination_id = 0
message = none
count = 0
tx_interval_ms = 1000
rx_timeout_ms = 50
seen_limit = 4096
print_rssi = false
include_self = false
channel_agility = true
hop_channels = 36,40,48
channel_width = HT20
hop_slot_ms = 5000
hop_epoch_ms = 0
channel_settle_ms = 250
channel_tx_guard_ms = 250
channel_down_up = true
sync_heartbeat = true
sync_interval_ms = 5000

[mesh_crypto]
enabled = true
security_domain = mesh_group
key_id = 1001
key_epoch = 1
key_hex = 000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f
replay_window = 4096

[c2_uplink_key.node1]
security_domain = node_to_c2
key_id = 4201
key_epoch = 1
key_hex = 101112131415161718191a1b1c1d1e1f202122232425262728292a2b2c2d2e2f

