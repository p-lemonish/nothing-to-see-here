[c2_gateway]
# Dedicated RX-only gateway config. Replace iface with a monitor-mode adapter.
# Set iface = none, or use configs/c2-gateway-auto.ini, to auto-detect the
# iface from a running mesh_txrx.py process on this PC.
iface = wlp3s0
stream_id = 0xdeadbeef
gateway_id = 1
c2_http_forward_url = http://80.69.173.183:8080/ingest
rx_timeout_ms = 50
seen_limit = 4096
print_rssi = false
include_self = false
channel_agility = true
hop_channels = 36,40,48
channel_width = HT20
hop_slot_ms = 5000
hop_epoch_ms = 0
channel_settle_ms = 250
channel_down_up = true
